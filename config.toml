[llm]
backend = "llamacpp"        # "llamacpp" | "ollama"
max_user_tokens = 16000     # token budget for user content
max_retries     = 5         # LLM call retries on empty/invalid response
max_tool_rounds = 5         # max internal tool calls per LLM decision (tool-use mode)

[llm.llamacpp]
base_url     = "http://localhost:8080/v1"
model_path   = "/models/model.gguf"  # mount a local GGUF here, or clear and use extra_args -hf
port         = 8080
ctx_size     = 32768
n_gpu_layers = 99
threads      = 8
temp         = 0.0
extra_args   = []  # add ["-hf", "unsloth/gemma-4-E2B-it-GGUF:gemma-4-E2B-it-Q4_K_M.gguf"] if no local model

[llm.ollama]
base_url = "http://localhost:11434/v1"
model    = "gemma3:4b"

[mcp]
base_url = "http://localhost:8000"

[ui]
port = 8081

[skills]
path = "/skills/radio-interferometry"   # mounted from ms-inspect repo

[state]
db_path = "/data/wildcat.db"

[casa]
executable = "python3"
args       = []
jobs_dir   = "/data/jobs"
